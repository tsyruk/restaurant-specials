<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Today’s Specials</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }
    .viewer { height:100vh; width:100vw; display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
    .slide { flex:0 0 100vw; height:100vh; scroll-snap-align:start; display:flex; align-items:center; justify-content:center; background:#000; position:relative; }
    .slide img { width:100vw; height:100vh; object-fit:cover; display:block; }
    .hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); color:white; font:14px system-ui, sans-serif; background:rgba(0,0,0,.45); padding:6px 10px; border-radius:999px; opacity:.75; }
    @media (min-width: 700px) { .slide img { object-fit:contain; } }
  </style>
</head>
<body>
  <main class="viewer" aria-label="Today's food specials photo viewer">
    <section class="slide"><img src="special1.jpg" alt="Food special 1"></section>
    <!-- Add more specials like this:
    <section class="slide"><img src="special2.jpg" alt="Food special 2"></section>
    <section class="slide"><img src="special3.jpg" alt="Food special 3"></section>
    -->
  </main>
  <div class="hint">Swipe for more specials</div>
  <script>
    setTimeout(() => document.querySelector('.hint')?.remove(), 4000);
  </script>
</body>
</html>

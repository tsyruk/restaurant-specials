<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Today's Special</title>
<style>
  html, body { margin:0; height:100%; background:#000; overflow:hidden; font-family: system-ui, -apple-system, sans-serif; }
  .stage { position:fixed; inset:0; background:#000; border:none; padding:0; cursor:pointer; }
  .stage img { width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
  .hint {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    color:white; font-size:14px; background:rgba(0,0,0,.45);
    padding:6px 10px; border-radius:999px; opacity:.75; z-index:5; pointer-events:none;
  }
  .panel {
    position:fixed; top:50%; left:50%; width:min(400px, 88vw);
    background:#111; color:#fff; z-index:10;
    transform:translate(-50%, -50%) scale(.92); opacity:0; pointer-events:none;
    transition:transform .2s ease, opacity .2s ease;
    box-shadow:0 12px 40px rgba(0,0,0,.6);
    display:flex; flex-direction:column;
    padding:28px 26px; box-sizing:border-box;
    border-radius:16px;
  }
  .panel.open { transform:translate(-50%, -50%) scale(1); opacity:1; pointer-events:auto; }
  .panel h2 { margin:0 0 6px; font-size:24px; }
  .panel .price { margin:0 0 18px; font-size:17px; color:#f2b134; font-weight:600; }
  .panel .desc { margin:0; font-size:16px; line-height:1.55; color:#ddd; }
  .panel-close {
    align-self:flex-end; width:36px; height:36px; border-radius:50%;
    background:rgba(255,255,255,.08); border:none; color:#fff; font-size:18px; cursor:pointer;
    margin-bottom:8px;
  }
  .scrim {
    position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:9;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .scrim.open { opacity:1; pointer-events:auto; }
</style>
</head>
<body>
<button class="stage" id="stage" aria-label="Show dish details">
  <img id="special-image" src="special5.png" alt="Today's Special">
</button>
<div class="hint">Tap the photo for details</div>
<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel" aria-hidden="true" aria-label="Dish details">
  <button class="panel-close" id="panelClose" aria-label="Close details">×</button>
  <h2 id="special-title">Pan-Seared Striped Bass</h2>
  <p id="special-price" class="price">$38</p>
  <p id="special-desc" class="desc">Pan-Seared Striped Bass
locally caught, over orange beurre blanc, with shaved fennel and orange salad tossed in charred citrus vinaigrette, fresh mint, black lentils and garlicky kale 38</p>
</aside>

<script>
  // Load latest special from JSON
  fetch('specials.json')
    .then(r => r.json())
    .then(data => {
      if (data && data.length > 0) {
        const s = data[0];
        
        // Update image
        document.getElementById('special-image').src = s.image;
        document.getElementById('special-image').alt = s.title;
        
        // Update panel
        document.getElementById('special-title').textContent = s.title;
        document.getElementById('special-price').textContent = '$' + s.price;
        document.getElementById('special-desc').textContent = s.description;
      }
    })
    .catch(err => {
      console.log("No special found yet", err);
    });

  // Panel controls
  const stage = document.getElementById('stage');
  const panel = document.getElementById('panel');
  const scrim = document.getElementById('scrim');
  const panelClose = document.getElementById('panelClose');

  function openPanel() {
    panel.classList.add('open');
    scrim.classList.add('open');
    panel.setAttribute('aria-hidden', 'false');
  }
  function closePanel() {
    panel.classList.remove('open');
    scrim.classList.remove('open');
    panel.setAttribute('aria-hidden', 'true');
  }

  stage.addEventListener('click', openPanel);
  scrim.addEventListener('click', closePanel);
  panelClose.addEventListener('click', closePanel);

  setTimeout(() => document.querySelector('.hint')?.remove(), 5000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Specials Admin</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9f9f9; }
    input, textarea, button { display: block; width: 100%; margin: 12px 0; padding: 12px; font-size: 16px; }
    button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #218838; }
    #status { margin-top: 15px; padding: 12px; background: #e9ecef; border-radius: 4px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Dinner Specials Admin</h1>
  
  <div id="pin-screen">
    <input type="password" id="pin" placeholder="Enter PIN (default 1234)" />
    <button onclick="checkPin()">Unlock</button>
  </div>

  <div id="token-screen" class="hidden">
    <input type="password" id="token" placeholder="Paste GitHub Token here" />
    <button onclick="saveTokenAndShowForm()">Continue</button>
    <div id="token-status" style="color:red; margin-top:10px;"></div>
  </div>

  <div id="admin-form" class="hidden">
    <input type="text" id="title" placeholder="Special Name" required />
    <input type="number" id="price" placeholder="Price" step="0.01" required />
    <textarea id="description" rows="5" placeholder="Description..." required></textarea>
    <input type="file" id="image" accept="image/*" required />
    <button onclick="submitSpecial()">Upload & Update</button>
    <div id="status"></div>
  </div>

  <script>
    const SECRET_PIN_HASH = "2ca0033";
    const REPO = "tsyruk/restaurant-specials";
    const BRANCH = "main";
    const IMAGE_FOLDER = "images/specials/";
    let GITHUB_TOKEN = "";
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      if (!base64) reject(new Error("Failed to read image"));
      resolve(base64);
    };
    reader.onerror = () => reject(new Error("Error reading file"));
    reader.readAsDataURL(file);
  });
}
    function checkPin() {
      if (simpleHash(document.getElementById("pin").value) === SECRET_PIN_HASH) {
        document.getElementById("pin-screen").classList.add("hidden");
        document.getElementById("token-screen").classList.remove("hidden");
      } else alert("Wrong PIN");
    }

    function saveTokenAndShowForm() {
      GITHUB_TOKEN = document.getElementById("token").value.trim();
      if (GITHUB_TOKEN) {
        document.getElementById("token-screen").classList.add("hidden");
        document.getElementById("admin-form").classList.remove("hidden");
      } else {
        document.getElementById("token-status").textContent = "Please paste a token";
      }
    }

    function simpleHash(str) { /* same as before */ 
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = (hash << 5) - hash + char;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(16);
    }

    // submitSpecial, fileToBase64, updateGitHubFile functions (same as previous version)
    async function submitSpecial() {
      const status = document.getElementById("status");
      status.textContent = "Uploading...";

      const title = document.getElementById("title").value.trim();
      const price = parseFloat(document.getElementById("price").value);
      const description = document.getElementById("description").value.trim();
      const fileInput = document.getElementById("image");

      if (!title || !price || !description || !fileInput.files[0]) {
        status.textContent = "Fill all fields and select image";
        return;
      }

      const imageFile = fileInput.files[0];
      const imageName = Date.now() + "-" + imageFile.name.replace(/\s+/g, '-');
      const imagePath = IMAGE_FOLDER + imageName;

      try {
        const imageBase64 = await fileToBase64(imageFile);
        await updateGitHubFile(imagePath, imageBase64, `Add image: ${title}`);

        const newSpecial = { title, price, description, image: `/${imagePath}`, date: new Date().toISOString().split('T')[0] };
        await updateGitHubFile("specials.json", JSON.stringify([newSpecial], null, 2), `Update special: ${title}`);

        status.innerHTML = `✅ Success! Refresh site to see changes.`;
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function updateGitHubFile(path, content, message) {
      const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
      const response = await fetch(url, {
        method: "PUT",
        headers: {
          "Authorization": `token ${GITHUB_TOKEN}`,
          "Accept": "application/vnd.github.v3+json",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message, content, branch: BRANCH })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.message || response.statusText);
      }
    }
  </script>
</body>
</html>
